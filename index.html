<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bornventure Mwema | Cybersecurity Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: 'Inter', sans-serif;
    background:#020617;
    color:#e2e8f0;
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    position:fixed;
    width:100%;
    background:#020617;
    border-bottom:1px solid #0ea5e9;
    z-index:1000;
}

nav h2 {color:#38bdf8;}
nav a {color:white; margin-left:20px; text-decoration:none;}

/* HERO */
.hero {
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

/* CANVAS BACKGROUND */
#network {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.hero-content {
    position:relative;
    z-index:1;
}

.hero h1 {font-size:3rem; color:#38bdf8;}
.hero p {margin-top:10px;}

.btn {
    margin-top:20px;
    padding:10px 20px;
    background:#0ea5e9;
    color:black;
    border-radius:8px;
    text-decoration:none;
}

/* SECTIONS */
section {padding:80px 40px;}
h2 {color:#38bdf8; margin-bottom:20px;}

/* PROJECTS */
.projects {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-8px);
    box-shadow:0 0 15px #0ea5e9;
}

footer {
    text-align:center;
    padding:20px;
    border-top:1px solid #0ea5e9;
}
</style>
</head>

<body>

<nav>
    <h2>BM</h2>
    <div>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<section class="hero">
    <canvas id="network"></canvas>

    <div class="hero-content">
        <h1>Bornventure Mwema</h1>
        <p id="typing"></p>
        <a href="Bornventure_Mwema_CV.pdf" download class="btn">Download CV</a>
    </div>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>Cybersecurity & DevOps enthusiast focused on building secure and resilient systems.</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">
            <h3>Venture Hotel System</h3>
            <p>Secure Laravel-based system.</p>
        </div>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
</section>

<footer>
<p>© 2026 Bornventure Mwema</p>
</footer>

<script>
// Typing Effect
const roles = ["Cybersecurity Engineer", "Penetration Tester", "DevOps Enthusiast"];
let i=0,j=0;

function type(){
    if(j < roles[i].length){
        document.getElementById("typing").innerHTML += roles[i][j];
        j++;
        setTimeout(type,60);
    } else {
        setTimeout(()=>{
            document.getElementById("typing").innerHTML="";
            j=0;
            i=(i+1)%roles.length;
            type();
        },1000);
    }
}
type();

// NETWORK NODES ANIMATION
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

for(let i=0;i<80;i++){
    nodes.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        dx:(Math.random()-0.5)*1,
        dy:(Math.random()-0.5)*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    nodes.forEach(n=>{
        n.x += n.dx;
        n.y += n.dy;

        if(n.x<0 || n.x>canvas.width) n.dx*=-1;
        if(n.y<0 || n.y>canvas.height) n.dy*=-1;

        ctx.beginPath();
        ctx.arc(n.x,n.y,2,0,Math.PI*2);
        ctx.fillStyle="#0ea5e9";
        ctx.fill();
    });

    for(let i=0;i<nodes.length;i++){
        for(let j=i+1;j<nodes.length;j++){
            let dist = Math.hypot(
                nodes[i].x - nodes[j].x,
                nodes[i].y - nodes[j].y
            );

            if(dist < 120){
                ctx.strokeStyle="rgba(14,165,233,0.2)";
                ctx.beginPath();
                ctx.moveTo(nodes[i].x,nodes[i].y);
                ctx.lineTo(nodes[j].x,nodes[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
