<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BM // GOD MODE PORTFOLIO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =====================
   BASE SYSTEM
===================== */
body{
margin:0;
overflow:hidden;
background:black;
color:#38bdf8;
font-family:monospace;
}

/* =====================
   BOOT SEQUENCE
===================== */
#boot{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.boot-line{
opacity:0;
animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* =====================
   MAIN HUD
===================== */
#hud{
position:fixed;
top:10px;
left:10px;
z-index:10;
font-size:12px;
color:#38bdf8;
}

/* =====================
   TERMINAL
===================== */
#terminal{
position:fixed;
bottom:0;
left:0;
width:40%;
height:40%;
background:rgba(0,0,0,0.7);
border-top:1px solid #38bdf8;
border-right:1px solid #38bdf8;
padding:10px;
overflow:auto;
}

#input{
width:100%;
background:black;
border:none;
color:#38bdf8;
outline:none;
font-family:monospace;
}

/* =====================
   AI PANEL
===================== */
#ai{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:rgba(10,15,30,0.8);
border-left:1px solid #38bdf8;
padding:10px;
overflow:auto;
}

.ai-msg{
margin:5px 0;
}

/* =====================
   CANVAS BACKGROUND
===================== */
canvas{
position:fixed;
top:0;
left:0;
}

/* =====================
   GLASS TEXT
===================== */
.title{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:3rem;
font-family:Orbitron;
text-shadow:0 0 20px #38bdf8;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
<div class="boot-line">INITIALIZING BM SYSTEM...</div>
<div class="boot-line">LOADING SECURITY MODULES...</div>
<div class="boot-line">DEPLOYING NEURAL NETWORK...</div>
</div>

<!-- HUD -->
<div id="hud">
SYSTEM: ONLINE<br>
SECURITY: MAXIMUM<br>
NODE STATUS: ACTIVE
</div>

<div class="title">BM // GOD MODE</div>

<!-- TERMINAL -->
<div id="terminal">
> SYSTEM READY<br><br>
<input id="input" placeholder="type command...">
</div>

<!-- AI PANEL -->
<div id="ai">
<div class="ai-msg">AI: Hello BM Operator 👋</div>
<div class="ai-msg">Ask about: projects, skills, security</div>
</div>

<script>

/* =====================
   BOOT SEQUENCE
===================== */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
},3000);

/* =====================
   SIMPLE AI ENGINE
===================== */
const ai=document.getElementById("ai");

function aiReply(msg){
let div=document.createElement("div");
div.className="ai-msg";

if(msg.includes("project")){
div.innerHTML="AI: You built a Laravel hotel system + WordPress security work.";
}
else if(msg.includes("skill")){
div.innerHTML="AI: Cybersecurity, DevOps, Pentesting, Forensics.";
}
else{
div.innerHTML="AI: Command not recognized in training data.";
}

ai.appendChild(div);
}

/* =====================
   TERMINAL COMMANDS
===================== */
const input=document.getElementById("input");
const terminal=document.getElementById("terminal");

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
let cmd=input.value.toLowerCase();
terminal.innerHTML+="<br>> "+cmd+"<br>";

if(cmd==="about"){
terminal.innerHTML+="Cybersecurity Engineer - BM SYSTEM ACTIVE<br>";
}
else if(cmd==="projects"){
terminal.innerHTML+="Venture Hotel System | WordPress Security | Network Lab<br>";
}
else if(cmd==="scan system"){
terminal.innerHTML+="Scanning... ALL SYSTEMS SECURE 🔐<br>";
}
else{
terminal.innerHTML+="Unknown command<br>";
}

aiReply(cmd);
input.value="";
terminal.scrollTop=terminal.scrollHeight;
}
});

/* =====================
   3D CYBER GLOBE
===================== */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry=new THREE.SphereGeometry(2,32,32);
const material=new THREE.MeshBasicMaterial({
color:0x38bdf8,
wireframe:true
});

const globe=new THREE.Mesh(geometry,material);
scene.add(globe);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y+=0.002;
globe.rotation.x+=0.001;
renderer.render(scene,camera);
}
animate();

/* =====================
   RESIZE FIX
===================== */
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
